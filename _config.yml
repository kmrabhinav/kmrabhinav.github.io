title: "Abhinav's Personal Blog"
description: "Exploring Tech, Strategy, Industry, Mathematics, Music, Travel, and Carpentry"
baseurl: "" # "" for user.github.io, or "/repo-name" for project site
url: "https://kumarabhinav.in"
remotetheme: "minimal-mistakes-jekyll"
plugins:
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-archives
minimal_mistakes_skin: "air" # Or "default", "dark", "mint", "neon", etc.
paginate: 5
paginate_path: "/page:num/"
collections:
